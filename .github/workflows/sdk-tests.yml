name: SDK Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'sdks/**'
      - 'spec/**'
  pull_request:
    branches: [main]
    paths:
      - 'sdks/**'
      - 'spec/**'

jobs:
  typescript-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install

      - name: Type check
        working-directory: sdks/typescript
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: sdks/typescript
        run: npx vitest run

      - name: Build
        working-directory: sdks/typescript
        run: npx tsup src/index.ts --format cjs,esm --dts

      - name: Verify package exports
        working-directory: sdks/typescript
        run: |
          node -e "const pkg = require('./dist/index.js'); if (!pkg.AIPClient) { process.exit(1); }"
          echo "CJS export OK"

  python-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: sdks/python
        run: pip install -e ".[dev]"

      - name: Type check
        working-directory: sdks/python
        run: |
          pip install mypy
          mypy agent_intent_protocol/ --ignore-missing-imports || true

      - name: Run tests
        working-directory: sdks/python
        run: pytest tests/ -v

  integration-smoke:
    runs-on: ubuntu-latest
    needs: [typescript-sdk, python-sdk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install TS SDK
        working-directory: sdks/typescript
        run: npm install

      - name: Build TS SDK
        working-directory: sdks/typescript
        run: npx tsup src/index.ts --format cjs,esm --dts

      - name: Smoke test health endpoint
        working-directory: sdks/typescript
        env:
          AIP_API_KEY: ${{ secrets.AIP_API_KEY }}
        run: |
          node -e "
            const { AIPClient } = require('./dist/index.js');
            const client = new AIPClient();
            client.health().then(r => {
              console.log('Health:', JSON.stringify(r));
              if (r.status !== 'healthy') process.exit(1);
              console.log('Integration smoke test passed');
            }).catch(e => {
              console.error('Health check failed:', e.message);
              process.exit(1);
            });
          "

  spec-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate JSON schema
        run: |
          node -e "
            const fs = require('fs');
            const schema = JSON.parse(fs.readFileSync('spec/intent-schema-v1.json', 'utf8'));
            console.log('Schema loaded:', schema.title || 'OK');
            console.log('Schema is valid JSON');
          "
